name: MLOps AWS Pipeline

on:
  push:
    branches: [main]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "params.yaml"
      - "requirements.txt"
      - ".github/workflows/mlops.yml"
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81" wheel
          pip install -r requirements.txt

      - name: Configure AWS credentials
        run: |
          mkdir -p ~/.aws

          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOF

          cat > ~/.aws/config <<EOF
          [default]
          region=${{ secrets.AWS_REGION }}
          output=json
          EOF

          aws sts get-caller-identity

      - name: Configure DVC remote
        run: |
          dvc remote modify myremote url s3://${{ secrets.S3_BUCKET }}/dvc
          dvc remote list

      - name: Pull data from DVC
        run: |
          dvc pull

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python src/train.py
          cat outputs/metrics.json

      - name: Upload model to S3
        run: |
          aws s3 cp models/model.pkl s3://${{ secrets.S3_BUCKET }}/models/latest/model.pkl
          aws s3 cp outputs/metrics.json s3://${{ secrets.S3_BUCKET }}/models/latest/metrics.json
          aws s3 ls s3://${{ secrets.S3_BUCKET }}/models/latest/

      - name: Restart EC2 service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 8
            sudo systemctl status mlops-serve --no-pager
            curl -f http://localhost:8000/health